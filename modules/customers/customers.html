<div id="customersContainer" class="space-y-6">
    <div class="glass-card p-6">
        <h2 class="text-xl font-bold text-blue-600 mb-4">👥 客户管理</h2>

        <!-- 搜索和筛选 -->
        <div class="flex gap-3 mb-4 flex-wrap">
            <input id="customerSearch" placeholder="🔍 搜索客户姓名/电话/车牌..." class="flex-1 p-3 border rounded-xl bg-gray-50 min-w-[150px] focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-200">
            <select id="customerLevelFilter" class="p-3 border rounded-xl bg-gray-50 focus:outline-none focus:border-blue-400">
                <option value="all">全部等级</option>
                <option value="钻石">💎 钻石</option>
                <option value="黄金">⭐ 黄金</option>
                <option value="白银">🥈 白银</option>
                <option value="青铜">🥉 青铜</option>
                <option value="普通">普通</option>
            </select>
        </div>

        <!-- 添加客户 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
            <input id="memberPhone" placeholder="📞 电话" class="p-3 border rounded-xl bg-gray-50 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-200">
            <input id="memberName" placeholder="👤 姓名" class="p-3 border rounded-xl bg-gray-50 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-200">
            <input id="memberPlate" placeholder="🚗 车牌" class="p-3 border rounded-xl bg-gray-50 uppercase focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-200">
            <input id="rechargeAmount" placeholder="💰 充值金额" type="number" class="p-3 border rounded-xl bg-gray-50 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-200">
        </div>
        <button onclick="CustomersModule.addCustomer()" class="btn-success py-3 rounded-xl font-bold w-full mb-4">
            <i class="fas fa-plus-circle"></i> 添加 / 充值
        </button>

        <div id="membersList" class="space-y-2 max-h-96 overflow-auto"></div>
    </div>
</div>
