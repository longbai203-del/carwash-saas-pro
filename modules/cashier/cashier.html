<div id="cashierContainer" class="h-full">
    
    <!-- ===== 三栏布局 ===== -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 h-full">
        
        <!-- ===== 左侧：客户信息 (3/12) ===== -->
        <div class="lg:col-span-3">
            <div class="glass-card p-4 h-full">
                
                <!-- 搜索区 -->
                <div class="mb-4">
                    <div class="relative">
                        <input id="posSearch" placeholder="🔍 车牌 / 手机 / 会员卡" 
                               class="w-full p-3 border rounded-xl bg-gray-50 text-sm focus:outline-none focus:border-blue-400">
                        <button onclick="CashierModule.quickSearch()" 
                                class="absolute right-2 top-2 bg-blue-600 text-white px-3 py-1 rounded-lg text-xs">
                            查询
                        </button>
                    </div>
                </div>

                <!-- 客户信息卡片 -->
                <div id="customerCard" class="bg-gradient-to-r from-blue-50 to-cyan-50 rounded-xl p-4 mb-4 hidden">
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="font-bold text-gray-800" id="custDisplayName">-</h4>
                            <p class="text-xs text-gray-500" id="custDisplayPhone">-</p>
                            <p class="text-xs text-gray-500">🚗 <span id="custDisplayPlate">-</span></p>
                        </div>
                        <span class="customer-level" id="custDisplayLevel">普通</span>
                    </div>
                    <div class="flex gap-3 mt-2 text-xs">
                        <span>💰 <span id="custDisplayBalance" class="font-bold text-green-600">0 SAR</span></span>
                        <span>⭐ <span id="custDisplayPoints" class="font-bold text-amber-600">0</span></span>
                        <span>📅 <span id="custDisplayVisits" class="font-bold text-blue-600">0</span></span>
                    </div>
                    <div class="flex gap-2 mt-3">
                        <button onclick="CashierModule.editCustomer()" class="text-xs bg-white px-3 py-1 rounded-lg shadow-sm hover:shadow">✏️ 编辑</button>
                        <button onclick="CashierModule.addVehicle()" class="text-xs bg-white px-3 py-1 rounded-lg shadow-sm hover:shadow">🚗 加车</button>
                        <button onclick="CashierModule.recharge()" class="text-xs bg-green-100 px-3 py-1 rounded-lg hover:bg-green-200">💰 充值</button>
                    </div>
                </div>

                <!-- 车辆信息 -->
                <div id="vehicleCard" class="bg-gray-50 rounded-xl p-3 mb-4 hidden">
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="font-bold text-sm">🚗 <span id="vehicleDisplayPlate">-</span></span>
                            <span class="text-xs text-gray-400 ml-2" id="vehicleDisplayModel">-</span>
                        </div>
                        <span class="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded-full" id="vehicleDisplayStatus">正常</span>
                    </div>
                    <div class="text-xs text-gray-400 mt-1">
                        上次服务: <span id="vehicleLastService">-</span>
                    </div>
                </div>

                <!-- 快捷操作 -->
                <div class="border-t pt-3">
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="CashierModule.quickNewCustomer()" class="text-xs bg-blue-50 hover:bg-blue-100 py-2 rounded-lg text-blue-600">
                            👤 新客户
                        </button>
                        <button onclick="CashierModule.scanQR()" class="text-xs bg-purple-50 hover:bg-purple-100 py-2 rounded-lg text-purple-600">
                            📱 扫码
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== 中间：服务选择 (5/12) ===== -->
        <div class="lg:col-span-5">
            <div class="glass-card p-4 h-full">
                
                <!-- 服务分类标签 -->
                <div class="flex gap-1 mb-3 overflow-x-auto">
                    <button class="tab-btn active text-xs px-3 py-1.5" data-cat="all" onclick="CashierModule.filterServices('all')">全部</button>
                    <button class="tab-btn text-xs px-3 py-1.5" data-cat="wash" onclick="CashierModule.filterServices('wash')">🧽 洗车</button>
                    <button class="tab-btn text-xs px-3 py-1.5" data-cat="detail" onclick="CashierModule.filterServices('detail')">✨ 美容</button>
                    <button class="tab-btn text-xs px-3 py-1.5" data-cat="package" onclick="CashierModule.filterServices('package')">📦 套餐</button>
                    <button class="tab-btn text-xs px-3 py-1.5" data-cat="product" onclick="CashierModule.filterServices('product')">🛒 商品</button>
                </div>

                <!-- 搜索服务 -->
                <div class="mb-3">
                    <input id="serviceSearch" placeholder="🔍 搜索服务 / 商品..." 
                           class="w-full p-2 border rounded-lg text-sm bg-gray-50 focus:outline-none focus:border-blue-400"
                           oninput="CashierModule.filterServices()">
                </div>

                <!-- 服务列表 -->
                <div class="grid grid-cols-2 gap-2 max-h-[320px] overflow-y-auto" id="serviceGrid">
                    <!-- 由 JS 动态渲染 -->
                </div>

                <!-- 最近使用 -->
                <div class="mt-3 border-t pt-3">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-medium text-gray-500">🕐 最近使用</span>
                        <span class="text-xs text-gray-400">点击快速添加</span>
                    </div>
                    <div class="flex gap-1 flex-wrap" id="recentServices"></div>
                </div>
            </div>
        </div>

        <!-- ===== 右侧：结算面板 (4/12) ===== -->
        <div class="lg:col-span-4">
            <div class="glass-card p-4 h-full flex flex-col">
                
                <!-- 购物车列表 -->
                <div class="flex-1 overflow-y-auto max-h-[300px]">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-sm text-gray-700">🛒 购物车</span>
                        <button onclick="CashierModule.clearCart()" class="text-xs text-red-500 hover:underline">清空</button>
                    </div>
                    <div id="cartItems" class="space-y-1">
                        <div class="text-center text-gray-400 py-8 text-sm">请选择服务或商品</div>
                    </div>
                </div>

                <!-- 优惠券 -->
                <div class="mt-2">
                    <div class="flex gap-2">
                        <input id="couponInput" placeholder="🎫 优惠券码" 
                               class="flex-1 p-2 border rounded-lg text-sm bg-gray-50">
                        <button onclick="CashierModule.applyCoupon()" class="btn-primary text-xs px-3 py-2 rounded-lg">应用</button>
                    </div>
                    <div id="couponDisplay" class="hidden mt-1 text-xs text-green-600"></div>
                </div>

                <!-- 结算明细 -->
                <div class="border-t mt-3 pt-3 space-y-1 text-sm">
                    <div class="flex justify-between">
                        <span class="text-gray-500">小计</span>
                        <span id="cartSubtotal" class="font-mono">0.00 SAR</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-500">折扣</span>
                        <span id="cartDiscount" class="font-mono text-green-600">0.00 SAR</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-500">增值税 (15%)</span>
                        <span id="cartVat" class="font-mono text-amber-600">0.00 SAR</span>
                    </div>
                    <div class="flex justify-between text-xl font-bold text-blue-600 pt-2 border-t">
                        <span>总计</span>
                        <span id="cartTotal">0.00 SAR</span>
                    </div>
                </div>

                <!-- 支付方式 -->
                <div class="mt-3">
                    <span class="text-xs font-medium text-gray-500 block mb-1">💳 支付方式</span>
                    <div class="grid grid-cols-3 gap-1">
                        <button onclick="CashierModule.selectPayment('cash')" 
                                class="payment-btn py-2 rounded-lg text-xs font-medium border bg-white hover:bg-gray-50" data-payment="cash">
                            💰 现金
                        </button>
                        <button onclick="CashierModule.selectPayment('mada')" 
                                class="payment-btn py-2 rounded-lg text-xs font-medium border bg-white hover:bg-gray-50" data-payment="mada">
                            🇸🇦 mada
                        </button>
                        <button onclick="CashierModule.selectPayment('card')" 
                                class="payment-btn py-2 rounded-lg text-xs font-medium border bg-white hover:bg-gray-50" data-payment="card">
                            💳 卡
                        </button>
                        <button onclick="CashierModule.selectPayment('apple_pay')" 
                                class="payment-btn py-2 rounded-lg text-xs font-medium border bg-white hover:bg-gray-50" data-payment="apple_pay">
                            📱 Apple Pay
                        </button>
                        <button onclick="CashierModule.selectPayment('stc_pay')" 
                                class="payment-btn py-2 rounded-lg text-xs font-medium border bg-white hover:bg-gray-50" data-payment="stc_pay">
                            📱 STC Pay
                        </button>
                        <button onclick="CashierModule.selectPayment('wallet')" 
                                class="payment-btn py-2 rounded-lg text-xs font-medium border bg-white hover:bg-gray-50" data-payment="wallet">
                            👛 钱包
                        </button>
                    </div>
                    <div id="selectedPayment" class="text-xs text-blue-600 mt-1 text-center">请选择支付方式</div>
                </div>

                <!-- 操作按钮 -->
                <div class="grid grid-cols-2 gap-2 mt-3">
                    <button onclick="CashierModule.checkout()" class="btn-success py-3 rounded-xl font-bold text-sm">
                        <i class="fas fa-check"></i> 收款
                    </button>
                    <button onclick="CashierModule.showPrintOptions()" class="bg-purple-600 hover:bg-purple-700 py-3 rounded-xl text-white font-bold text-sm">
                        <i class="fas fa-print"></i> 打印
                    </button>
                    <button onclick="CashierModule.holdCart()" class="bg-amber-500 hover:bg-amber-600 py-2 rounded-lg text-white font-bold text-xs col-span-2">
                        <i class="fas fa-bookmark"></i> 挂单
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 底部状态栏 ===== -->
    <div class="mt-3 flex justify-between items-center text-xs text-gray-400 bg-white/80 backdrop-blur rounded-xl px-4 py-2">
        <div>
            <span>👨‍💼 <span id="cashierStaffName">-</span></span>
            <span class="mx-3">|</span>
            <span>🏪 <span id="cashierStoreName">-</span></span>
        </div>
        <div>
            <span id="cashierStatus" class="text-green-600">🟢 在线</span>
            <span class="mx-3">|</span>
            <span>今日: <span id="cashierTodayCount">0</span> 单 | <span id="cashierTodayRevenue" class="font-bold text-blue-600">0 SAR</span></span>
        </div>
    </div>

</div>

<!-- ===== 挂单列表弹窗 ===== -->
<div id="holdOrdersModal" class="modal-glass hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-5 mx-4">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold text-blue-600">📋 挂单列表</h3>
            <button onclick="CashierModule.closeHoldOrders()" class="text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div id="holdOrdersList" class="space-y-2 max-h-80 overflow-auto"></div>
    </div>
</div>

<!-- ===== 打印选项弹窗 ===== -->
<div id="printOptionsModal" class="modal-glass hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-5 mx-4">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold text-blue-600">🖨️ 打印选项</h3>
            <button onclick="CashierModule.closePrintOptions()" class="text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div class="space-y-2">
            <button onclick="CashierModule.printReceipt()" class="w-full btn-primary py-2.5 rounded-lg font-bold text-sm">
                <i class="fas fa-receipt"></i> 小票（热敏）
            </button>
            <button onclick="CashierModule.printTaxInvoice()" class="w-full bg-green-600 hover:bg-green-700 py-2.5 rounded-lg text-white font-bold text-sm">
                <i class="fas fa-file-invoice"></i> 税务发票（ZATCA标准）
            </button>
            <button onclick="CashierModule.closePrintOptions()" class="w-full btn-outline py-2.5 rounded-lg font-bold text-sm">取消</button>
        </div>
    </div>
</div>

<!-- ===== 新客户快速弹窗 ===== -->
<div id="newCustomerModal" class="modal-glass hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-5 mx-4">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold text-blue-600">👤 快速添加客户</h3>
            <button onclick="CashierModule.closeNewCustomer()" class="text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div class="space-y-3">
            <div>
                <label class="text-xs font-medium text-gray-500">姓名 *</label>
                <input id="newCustName" class="w-full p-2.5 border rounded-lg text-sm mt-1 bg-gray-50">
            </div>
            <div>
                <label class="text-xs font-medium text-gray-500">手机号 *</label>
                <input id="newCustPhone" class="w-full p-2.5 border rounded-lg text-sm mt-1 bg-gray-50">
            </div>
            <div>
                <label class="text-xs font-medium text-gray-500">车牌号</label>
                <input id="newCustPlate" class="w-full p-2.5 border rounded-lg text-sm mt-1 bg-gray-50 uppercase">
            </div>
            <button onclick="CashierModule.saveNewCustomer()" class="btn-primary w-full py-2.5 rounded-lg font-bold text-sm">
                保存客户
            </button>
        </div>
    </div>
</div>
