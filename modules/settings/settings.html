<div id="settingsContainer" class="space-y-6">
    <div class="glass-card p-6">
        <h2 class="text-xl font-bold text-blue-600 mb-4">⚙️ 系统设置</h2>

        <!-- 店铺信息 -->
        <div class="border-b border-gray-200 pb-4 mb-4">
            <h3 class="text-sm font-semibold text-gray-600 mb-3">🏪 店铺信息</h3>
            <div class="space-y-3">
                <div>
                    <label class="text-sm font-medium text-gray-600">店铺名称</label>
                    <input id="shopName" placeholder="请输入店铺名称" class="w-full p-3 border rounded-xl bg-gray-50 mt-1 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-200">
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-600">税号</label>
                    <input id="shopTaxId" placeholder="请输入税号" class="w-full p-3 border rounded-xl bg-gray-50 mt-1 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-200">
                </div>
            </div>
        </div>

        <!-- 税务 & 提成 -->
        <div class="border-b border-gray-200 pb-4 mb-4">
            <h3 class="text-sm font-semibold text-gray-600 mb-3">💰 税务 & 提成</h3>
            <div class="space-y-3">
                <div>
                    <label class="text-sm font-medium text-gray-600">增值税率 (%)</label>
                    <input id="vatRateInput" type="number" step="0.5" placeholder="15" class="w-full p-3 border rounded-xl bg-gray-50 mt-1 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-200">
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-600">提成比例 (%)</label>
                    <input id="commissionRate" type="number" step="0.5" placeholder="5" class="w-full p-3 border rounded-xl bg-gray-50 mt-1 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-200">
                </div>
            </div>
        </div>

        <!-- 门店管理 -->
        <div class="border-b border-gray-200 pb-4 mb-4">
            <h3 class="text-sm font-semibold text-gray-600 mb-3">🏪 门店管理</h3>
            <div class="flex gap-2 flex-wrap">
                <input id="newBranchName" placeholder="门店名称" class="flex-1 p-3 border rounded-xl bg-gray-50 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-200">
                <input id="newBranchAddress" placeholder="地址" class="flex-1 p-3 border rounded-xl bg-gray-50 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-200">
                <button onclick="alert('添加门店功能开发中')" class="btn-primary px-4 py-3 rounded-xl">添加门店</button>
            </div>
            <div id="branchList" class="mt-3 space-y-1 max-h-48 overflow-auto"></div>
        </div>

        <button id="saveSettingsBtn" class="btn-primary py-3 rounded-xl font-bold w-full">
            <i class="fas fa-save"></i> 保存所有设置
        </button>
    </div>
</div>
