<div id="settingsContainer" class="space-y-6">
    <!-- ===== 系统设置 ===== -->
    <div class="glass-card p-6">
        <h2 class="text-xl font-bold text-blue-600 mb-4">⚙️ 系统设置</h2>

        <!-- 店铺信息 -->
        <div class="border-b border-gray-200 pb-4 mb-4">
            <h3 class="text-sm font-semibold text-gray-600 mb-3">🏪 店铺信息</h3>
            <div class="space-y-3">
                <div>
                    <label class="text-sm font-medium text-gray-600">店铺名称</label>
                    <input id="shopName" placeholder="请输入店铺名称" class="w-full p-3 border rounded-xl bg-gray-50 mt-1 focus:outline-none focus:border-blue-400">
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-600">税号</label>
                    <input id="shopTaxId" placeholder="请输入税号" class="w-full p-3 border rounded-xl bg-gray-50 mt-1 focus:outline-none focus:border-blue-400">
                </div>
            </div>
        </div>

        <!-- 税务 & 提成 -->
        <div class="border-b border-gray-200 pb-4 mb-4">
            <h3 class="text-sm font-semibold text-gray-600 mb-3">💰 税务 & 提成</h3>
            <div class="space-y-3">
                <div>
                    <label class="text-sm font-medium text-gray-600">增值税率 (%)</label>
                    <input id="vatRateInput" type="number" step="0.5" placeholder="15" class="w-full p-3 border rounded-xl bg-gray-50 mt-1 focus:outline-none focus:border-blue-400">
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-600">提成比例 (%)</label>
                    <input id="commissionRate" type="number" step="0.5" placeholder="5" class="w-full p-3 border rounded-xl bg-gray-50 mt-1 focus:outline-none focus:border-blue-400">
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-600">低库存预警 (件)</label>
                    <input id="lowStockAlert" type="number" placeholder="5" class="w-full p-3 border rounded-xl bg-gray-50 mt-1 focus:outline-none focus:border-blue-400">
                </div>
            </div>
        </div>

        <button id="saveSettingsBtn" class="btn-primary py-3 rounded-xl font-bold w-full">
            <i class="fas fa-save"></i> 保存所有设置
        </button>
    </div>

    <!-- ===== 门店管理 ===== -->
    <div class="glass-card p-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-blue-600">🏪 门店管理</h2>
            <button onclick="SettingsModule.showAddStore()" class="btn-success px-4 py-2 rounded-lg">
                <i class="fas fa-plus"></i> 添加门店
            </button>
        </div>

        <div id="storeList" class="space-y-2 max-h-96 overflow-auto"></div>
    </div>

    <!-- ===== 添加门店模态框 ===== -->
    <div id="addStoreModal" class="modal-glass hidden">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 mx-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-blue-600">➕ 添加门店</h3>
                <button onclick="SettingsModule.closeAddStore()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="space-y-3">
                <div>
                    <label class="text-sm font-medium text-gray-600">门店名称 *</label>
                    <input id="storeName" placeholder="请输入门店名称" class="w-full p-3 border rounded-xl mt-1 bg-gray-50 focus:outline-none focus:border-blue-400">
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-600">地址</label>
                    <input id="storeAddress" placeholder="请输入地址" class="w-full p-3 border rounded-xl mt-1 bg-gray-50 focus:outline-none focus:border-blue-400">
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-600">电话</label>
                    <input id="storePhone" placeholder="请输入电话" class="w-full p-3 border rounded-xl mt-1 bg-gray-50 focus:outline-none focus:border-blue-400">
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-600">店长</label>
                    <input id="storeManager" placeholder="请输入店长姓名" class="w-full p-3 border rounded-xl mt-1 bg-gray-50 focus:outline-none focus:border-blue-400">
                </div>
                <button onclick="SettingsModule.saveStore()" class="btn-primary py-3 rounded-xl font-bold w-full">
                    <i class="fas fa-save"></i> 保存门店
                </button>
            </div>
        </div>
    </div>
</div>
