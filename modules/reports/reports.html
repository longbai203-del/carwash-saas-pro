<div id="reportsContainer" class="space-y-6">
    <div class="glass-card p-6">
        <h2 class="text-xl font-bold text-blue-600 mb-4">📊 财务管理</h2>

        <!-- 日期选择 -->
        <div class="flex gap-3 mb-4 flex-wrap">
            <input type="date" id="reportDatePicker" class="p-3 border rounded-xl bg-gray-50 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-200">
            <button onclick="ReportsModule.loadData()" class="btn-primary px-6 py-3 rounded-xl"><i class="fas fa-search"></i> 查看</button>
            <button onclick="alert('导出功能开发中')" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl"><i class="fas fa-file-excel"></i> 导出</button>
        </div>

        <!-- 统计 -->
        <div class="grid grid-cols-4 gap-3 mb-4">
            <div class="bg-blue-50 p-3 rounded-xl text-center">
                <div class="text-2xl font-bold text-blue-600" id="dailyOrders">0</div>
                <div class="text-xs text-gray-500">📋 今日订单</div>
            </div>
            <div class="bg-green-50 p-3 rounded-xl text-center">
                <div class="text-2xl font-bold text-green-600" id="dailyRevenue">0 SAR</div>
                <div class="text-xs text-gray-500">💰 今日收入</div>
            </div>
            <div class="bg-purple-50 p-3 rounded-xl text-center">
                <div class="text-2xl font-bold text-purple-600" id="dailyVat">0 SAR</div>
                <div class="text-xs text-gray-500">🧾 增值税</div>
            </div>
            <div class="bg-orange-50 p-3 rounded-xl text-center">
                <div class="text-2xl font-bold text-orange-600" id="dailyProfit">0 SAR</div>
                <div class="text-xs text-gray-500">📈 净利润</div>
            </div>
        </div>

        <div id="reportTableBody" class="text-sm max-h-72 overflow-auto bg-gray-50 rounded-xl p-2"></div>
    </div>
</div>
